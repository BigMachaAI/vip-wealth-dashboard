name: Daily Portfolio Update

on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run snapshot
        run: |
          python services/snapshot.py

      - name: Commit changes
        run: |
          git config --global user.name "wealth-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add data/history.csv
          git commit -m "Daily portfolio snapshot" || exit 0
          git push
